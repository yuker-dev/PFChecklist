<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFChecklist</title>
</head>
<body>
    <h1>PFChecklist</h1>
    <p>Welcome to PFChecklist, a simple website designed for project flight!</p>
    <p>Naviguate with the following links:</p>
    <nav>
        <ul>
            <li><a href="#beforestart">Before start checklist</a></li>
            <li><a href="#start">Start checklist</a></li>
        </ul>
    </nav>

    <div id="#beforestart">
        <h3>Before start checklist</h3>
        <ul>
            <li><input type="checkbox" id="option1">
                <label for="option1"> Navigation lights</label></li>
            <li><input type="checkbox" id="option2">
                <label for="option2">Logo lights</label></li>
            <li><input type="checkbox" id="option3">
                <label for="option3">IFR clearance (ATC servers)</label></li>
        </ul>        
    </div>

    <div id="#start">
        <h3>Start checklist</h3>
        <ul>
            <li><input type="checkbox" id="option1">
                <label for="option1">Push & Start clearance (ATC servers)</start-up></label></li>
            <li><input type="checkbox" id="option2">
                <label for="option2">Beacon lights</label></li>
            <li><input type="checkbox" id="option3">
                <label for="option3">Engine 2 start-up</start-up></label></li>
            <li><input type="checkbox" id="option4">
                <label for="option4">Engine 1 start-up</start-up></label></li>


        </ul>
    </div>

</body>
</html>
